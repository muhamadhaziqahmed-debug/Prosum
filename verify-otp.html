<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Verify OTP</title>
    <link rel="stylesheet" href="CSS/auth-pages.css" />
  </head>
  <body>
    <div class="card">
      <h1>Verify OTP</h1>
      <p>Enter the 6-digit code.</p>

      <div class="otp-boxes">
        <input maxlength="1" inputmode="numeric" />
        <input maxlength="1" inputmode="numeric" />
        <input maxlength="1" inputmode="numeric" />
        <input maxlength="1" inputmode="numeric" />
        <input maxlength="1" inputmode="numeric" />
        <input maxlength="1" inputmode="numeric" />
      </div>

      <button id="verify-btn">Verify</button>
    </div>

    <script>
      const verifyBtn = document.getElementById('verify-btn');
      const otpInputs = document.querySelectorAll('.otp-boxes input');

      /* ---------- Verify button: validate OTP length before redirecting ---------- */
      verifyBtn.addEventListener('click', () => {
        let otp = '';
        otpInputs.forEach((input) => {
          otp += input.value;
        });

        if (otp.length !== 6) {
          alert('Please enter the complete OTP.');
          return;
        }

        window.location.href = 'reset-password.html';
      });

      /* ---------- OTP boxes: digits only, auto-advance, backspace, enter-to-submit ---------- */
      otpInputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
          const value = e.target.value;

          // Allow only one digit
          e.target.value = value.replace(/[^0-9]/g, '').slice(0, 1);

          // Move to next box
          if (e.target.value && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
          }
        });

        input.addEventListener('keydown', (e) => {
          // Move back on backspace
          if (e.key === 'Backspace' && !input.value && index > 0) {
            otpInputs[index - 1].focus();
          }

          // Submit on Enter
          if (e.key === 'Enter') {
            verifyBtn.click();
          }
        });
      });
    </script>
  </body>
</html>
