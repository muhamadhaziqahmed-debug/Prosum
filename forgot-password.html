<!doctype html>
<html lang="en">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f4f4f4;
      font-family: Montserrat, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 360px;
      max-width: 90%;
      background: white;
      padding: 35px;
      border-radius: 8px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    h1 {
      font-size: 32px;
      font-weight: 600;
      color: #222;
      margin-bottom: 10px;
    }

    p {
      color: #777;
      font-size: 15px;
      margin-bottom: 35px;
    }

    label {
      display: block;
      text-align: left;
      font-size: 13px;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      height: 40px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-shadow: 0 3px 4px rgba(0, 0, 0, 0.1);
      box-sizing: border-box;
    }

    button {
      width: 100%;
      height: 48px;
      margin-top: 20px;
      border: none;
      border-radius: 9px;
      background: linear-gradient(to left, #4da3ff, #1f6fd0, #4da3ff);
      color: white;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
      background: linear-gradient(to left, #1f6fd0, #4da3ff, #1f6fd0);
    }
    a {
      display: inline-block;
      margin-top: 20px;
      color: #555;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 25px;
      color: #999;
      font-size: 12px;
    }
  </style>
  <body>
    <div class="card">
      <h1>Password recovery</h1>
      <p>Enter your email address to reset your password</p>

      <label for="email">Email</label>
      <input type="email" id="email" />

      <button>Send Reset Link</button>

      <a href="#">Log back in</a>

      <footer>&copy; 2023 WCS LAT</footer>
    </div>
  </body>
</html>
