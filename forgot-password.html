<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot password</title>
    <link rel="stylesheet" href="CSS/forgot-password.css" />
  </head>
  <body>
    <div class="card">
      <h1>Password recovery</h1>
      <p>Enter your email address to reset your password</p>

      <label for="email">Email</label>
      <input type="email" id="email" required />

      <button type="button" id="send-reset-btn">Send Reset Link</button>

      <a href="#">Log back in</a>

      <footer>&copy; 2023 WCS LAT</footer>
    </div>

    <script>
      document.getElementById('send-reset-btn').addEventListener('click', () => {
        setTimeout(() => {
          window.location.href = 'otp-sent.html';
        }, 3000);
      });
    </script>
  </body>
</html>
